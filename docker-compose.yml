services:
  api:
    build: .
    ports:
      - "3333:3333"
    environment:
      - DATABASE_URL=postgresql://larfraterno:larfraterno@db:5432/larfraterno?schema=public
      - DIRECT_URL=postgresql://larfraterno:larfraterno@db:5432/larfraterno?schema=public
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - PORT=3333
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: larfraterno
      POSTGRES_PASSWORD: larfraterno
      POSTGRES_DB: larfraterno
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U larfraterno"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
